<!DOCTYPE html>
<html lang="sv" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>{% block title %}Fotoscan{% endblock %}</title>
    <!-- Kritisk inline-stil: mörk bakgrund direkt innan CSS hunnit appliceras -->
    <style>html,body{background:#15171c;color:#e6e8ec}</style>
    <!-- Självhostad Bootstrap (lokalt = snabbt, ingen FOUC, funkar offline) -->
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar bg-body-tertiary border-bottom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-images"></i> Fotoscan</a>
            <a class="nav-link d-inline-flex align-items-center gap-1 px-2" href="/persons">
                <i class="bi bi-people"></i> Personer
            </a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                {% block headeractions %}{% endblock %}
            </div>
        </div>
    </nav>
    <main class="container-fluid py-3">
        {% block content %}{% endblock %}
    </main>

    <div id="lightbox" class="lightbox" hidden>
        <img id="lightbox-img" src="" alt="">
    </div>

    <div class="modal fade" id="confirm-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body" id="confirm-modal-body"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Avbryt</button>
                    <button type="button" class="btn btn-primary" id="confirm-ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-host position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index:1100">
        <div id="toast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-body"></div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap.bundle.min.js"></script>
    <script src="/static/js/utils.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
