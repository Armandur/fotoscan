<!DOCTYPE html>
<html lang="sv" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Fotoscan{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar bg-body-tertiary border-bottom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-images"></i> Fotoscan</a>
            <div class="d-flex align-items-center gap-2">
                {% block headeractions %}{% endblock %}
            </div>
        </div>
    </nav>
    <main class="container-fluid py-3">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-host position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index:1100">
        <div id="toast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/utils.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
