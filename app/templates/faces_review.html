{% extends "base.html" %}
{% block title %}Ansiktsgranskning - Fotoscan{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <h1 class="h4 mb-0">AI-ansiktsgranskning</h1>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" id="scan-btn">
            <i class="bi bi-robot"></i> Kör AI-detektering
        </button>
        <button class="btn btn-outline-secondary btn-sm" id="scan-force-btn"
                title="Kör om alla foton, även redan behandlade">
            <i class="bi bi-arrow-repeat"></i> Kör om alla
        </button>
    </div>
</div>

<div class="text-secondary small mb-2" id="scan-info">
    {{ scanned }}/{{ total_photos }} foton behandlade. {{ pending }} ansikten väntar på granskning.
</div>

<div class="progress mb-3 d-none" id="scan-progress" style="height:20px">
    <div class="progress-bar progress-bar-striped progress-bar-animated" id="scan-bar" style="width:0%">0%</div>
</div>
<div class="alert alert-info py-2 d-none" id="scan-msg"></div>

<div id="pending-root"></div>

<datalist id="person-list"></datalist>
{% endblock %}

{% block scripts %}
<script>
(() => {
    const root = document.getElementById("pending-root");
    const info = document.getElementById("scan-info");
    const progress = document.getElementById("scan-progress");
    const bar = document.getElementById("scan-bar");
    const msg = document.getElementById("scan-msg");

    async function fillPersons() {
        try {
            const names = await apiFetch("/api/tags?kind=person");
            document.getElementById("person-list").innerHTML =
                names.map(n => `<option value="${escapeHtml(n)}">`).join("");
        } catch (e) { /* tomt är ok */ }
    }

    function faceCard(f, suggestedName) {
        const col = document.createElement("div");
        col.className = "col-6 col-sm-4 col-md-3 col-lg-2";
        col.dataset.faceId = f.id;
        const card = document.createElement("div");
        card.className = "card h-100";
        card.innerHTML =
            `<img class="card-img-top" src="/api/faces/${f.id}/thumb" alt="" style="aspect-ratio:1;object-fit:cover">
             <div class="card-body p-2 d-flex flex-column gap-1">
                <a href="/photo/${f.photo_id}" class="small text-truncate text-secondary" target="_blank" title="${escapeHtml(f.filename)}">${escapeHtml(f.filename)}</a>
                ${suggestedName ? `<button class="btn btn-success btn-sm py-0" data-act="confirm-suggest"><i class="bi bi-check-lg"></i> ${escapeHtml(suggestedName)}</button>` : ""}
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control py-0" list="person-list" placeholder="Person...">
                    <button class="btn btn-outline-primary" data-act="confirm-name" title="Spara"><i class="bi bi-check2"></i></button>
                </div>
                <button class="btn btn-outline-danger btn-sm py-0" data-act="reject"><i class="bi bi-trash"></i> Avvisa</button>
             </div>`;
        col.appendChild(card);

        const remove = () => { col.remove(); refreshEmpty(); };
        card.querySelector('[data-act="reject"]').addEventListener("click", async () => {
            try { await apiFetch(`/api/faces/${f.id}`, { method: "DELETE" }); remove(); }
            catch (e) { showToast("Misslyckades: " + e.message, true); }
        });
        const sug = card.querySelector('[data-act="confirm-suggest"]');
        if (sug) sug.addEventListener("click", async () => {
            try { await apiFetch(`/api/faces/${f.id}/confirm`, { method: "POST", body: { name: suggestedName } }); showToast("Bekräftad: " + suggestedName); remove(); }
            catch (e) { showToast("Misslyckades: " + e.message, true); }
        });
        card.querySelector('[data-act="confirm-name"]').addEventListener("click", async () => {
            const name = card.querySelector('input').value.trim();
            if (!name) { showToast("Ange en person", true); return; }
            try { await apiFetch(`/api/faces/${f.id}/confirm`, { method: "POST", body: { name } }); showToast("Bekräftad: " + name); remove(); }
            catch (e) { showToast("Misslyckades: " + e.message, true); }
        });
        return col;
    }

    function refreshEmpty() {
        if (!root.querySelector("[data-face-id]")) {
            root.innerHTML = '<div class="alert alert-secondary">Inga ansikten att granska. Kör AI-detektering för att hitta fler.</div>';
        }
    }

    async function loadPending() {
        let data;
        try { data = await apiFetch("/api/faces/ai/pending"); }
        catch (e) { root.innerHTML = '<div class="alert alert-danger">Kunde inte ladda.</div>'; return; }
        root.innerHTML = "";
        if (!data.total) { refreshEmpty(); return; }
        for (const g of data.groups) {
            const sec = document.createElement("div");
            sec.className = "mb-4";
            const head = document.createElement("div");
            head.className = "d-flex align-items-center gap-2 mb-2";
            const title = g.suggested_name
                ? `Förslag: <strong>${escapeHtml(g.suggested_name)}</strong>`
                : `<span class="text-secondary">Inget namnförslag</span>`;
            head.innerHTML = `<h2 class="h6 mb-0">${title}</h2><span class="badge text-bg-secondary">${g.faces.length}</span>`;
            if (g.suggested_id) {
                const all = document.createElement("button");
                all.className = "btn btn-success btn-sm py-0 ms-2";
                all.innerHTML = `<i class="bi bi-check-all"></i> Bekräfta alla (${g.faces.length})`;
                all.addEventListener("click", async () => {
                    if (!(await showConfirm(`Bekräfta alla ${g.faces.length} ansikten som ${g.suggested_name}?`, { okLabel: "Bekräfta", okClass: "btn-success" }))) return;
                    try { const r = await apiFetch("/api/faces/ai/confirm-group", { method: "POST", body: { suggested_tag_id: g.suggested_id } }); showToast(`${r.count} bekräftade`); loadPending(); }
                    catch (e) { showToast("Misslyckades: " + e.message, true); }
                });
                head.appendChild(all);
            }
            sec.appendChild(head);
            const grid = document.createElement("div");
            grid.className = "row g-2";
            for (const f of g.faces) grid.appendChild(faceCard(f, g.suggested_name));
            sec.appendChild(grid);
            root.appendChild(sec);
        }
    }

    let poll = null;
    function startPolling() {
        progress.classList.remove("d-none");
        if (poll) clearInterval(poll);
        poll = setInterval(async () => {
            let s;
            try { s = await apiFetch("/api/faces/ai/status"); } catch (e) { return; }
            const pct = s.total ? Math.round(100 * s.done / s.total) : 0;
            bar.style.width = pct + "%"; bar.textContent = `${s.done}/${s.total}`;
            if (s.message) { msg.classList.remove("d-none"); msg.textContent = s.message; }
            if (!s.running) {
                clearInterval(poll); poll = null;
                bar.classList.remove("progress-bar-animated");
                if (s.error) showToast("Fel: " + s.error, true);
                else showToast(s.message || "Klart");
                loadPending(); fillPersons();
            }
        }, 1500);
    }

    async function scan(force) {
        try {
            await apiFetch(`/api/faces/ai/scan${force ? "?force=true" : ""}`, { method: "POST" });
            bar.classList.add("progress-bar-animated");
            startPolling();
        } catch (e) { showToast("Kunde inte starta: " + e.message, true); }
    }

    document.getElementById("scan-btn").addEventListener("click", () => scan(false));
    document.getElementById("scan-force-btn").addEventListener("click", async () => {
        if (!(await showConfirm("Kör om AI-detektering på ALLA foton? Tidigare obekräftade förslag ersätts.", { okLabel: "Kör om" }))) return;
        scan(true);
    });

    fillPersons();
    loadPending();
    // Om ett jobb redan kör (t.ex. efter sidladdning) - börja polla.
    apiFetch("/api/faces/ai/status").then(s => { if (s.running) startPolling(); }).catch(() => {});
})();
</script>
{% endblock %}
