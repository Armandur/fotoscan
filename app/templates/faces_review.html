{% extends "base.html" %}
{% block title %}Ansiktsgranskning - Fotoscan{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <h1 class="h4 mb-0">AI-ansiktsgranskning</h1>
    <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" id="scan-btn">
            <i class="bi bi-robot"></i> Kör AI-detektering
        </button>
        <button class="btn btn-outline-secondary btn-sm" id="scan-force-btn"
                title="Kör om alla foton, även redan behandlade">
            <i class="bi bi-arrow-repeat"></i> Kör om alla
        </button>
        <button class="btn btn-warning btn-sm d-none" id="scan-cancel-btn"
                title="Stanna jobbet vid nästa foto (klart arbete behålls)">
            <i class="bi bi-stop-circle"></i> Avbryt
        </button>
    </div>
</div>

<div class="text-secondary small mb-2" id="scan-info">
    {{ scanned }}/{{ total_photos }} foton behandlade. {{ pending }} ansikten väntar på granskning.
</div>

<div class="progress mb-3 d-none" id="scan-progress" style="height:20px">
    <div class="progress-bar progress-bar-striped progress-bar-animated" id="scan-bar" style="width:0%">0%</div>
</div>
<div class="alert alert-info py-2 d-none" id="scan-msg"></div>

<div id="photos-root"></div>
{% endblock %}

{% block scripts %}
<script>
(() => {
    const root = document.getElementById("photos-root");
    const progress = document.getElementById("scan-progress");
    const bar = document.getElementById("scan-bar");
    const msg = document.getElementById("scan-msg");

    function photoCard(p) {
        const col = document.createElement("div");
        col.className = "col-6 col-sm-4 col-md-3 col-lg-2";
        const a = document.createElement("a");
        a.href = `/faces/review/${p.photo_id}`;
        a.className = "card photo-card text-decoration-none h-100";
        const crops = p.face_ids.slice(0, 5).map(
            id => `<img src="/api/faces/${id}/thumb" alt="" style="width:34px;height:34px;object-fit:cover;border-radius:4px">`
        ).join("");
        a.innerHTML =
            `<img loading="lazy" class="card-img-top" src="/thumb/${p.photo_id}" alt="">
             <div class="card-body p-2">
                <div class="d-flex flex-wrap gap-1 mb-1">${crops}</div>
                <div class="text-truncate small" title="${escapeHtml(p.filename)}">${escapeHtml(p.filename)}</div>
                <span class="badge text-bg-primary">${p.face_ids.length} ansikte${p.face_ids.length !== 1 ? "n" : ""}</span>
             </div>`;
        col.appendChild(a);
        return col;
    }

    async function loadPhotos() {
        let data;
        try { data = await apiFetch("/api/faces/ai/photos"); }
        catch (e) { root.innerHTML = '<div class="alert alert-danger">Kunde inte ladda.</div>'; return; }
        if (!data.total) {
            root.innerHTML = '<div class="alert alert-secondary">Inga ansikten att granska. Kör AI-detektering för att hitta fler.</div>';
            return;
        }
        const grid = document.createElement("div");
        grid.className = "row g-2";
        for (const p of data.photos) grid.appendChild(photoCard(p));
        root.innerHTML = "";
        root.appendChild(grid);
    }

    const cancelBtn = document.getElementById("scan-cancel-btn");
    let poll = null;
    function startPolling() {
        progress.classList.remove("d-none");
        cancelBtn.classList.remove("d-none");
        cancelBtn.disabled = false;
        if (poll) clearInterval(poll);
        poll = setInterval(async () => {
            let s;
            try { s = await apiFetch("/api/faces/ai/status"); } catch (e) { return; }
            const pct = s.total ? Math.round(100 * s.done / s.total) : 0;
            bar.style.width = pct + "%"; bar.textContent = `${s.done}/${s.total}`;
            if (s.message) { msg.classList.remove("d-none"); msg.textContent = s.message; }
            if (!s.running) {
                clearInterval(poll); poll = null;
                bar.classList.remove("progress-bar-animated");
                cancelBtn.classList.add("d-none");
                if (s.error) showToast("Fel: " + s.error, true);
                else showToast(s.message || "Klart");
                loadPhotos();
            }
        }, 1500);
    }

    cancelBtn.addEventListener("click", async () => {
        cancelBtn.disabled = true;
        try { await apiFetch("/api/faces/ai/cancel", { method: "POST" }); showToast("Avbryter vid nästa foto..."); }
        catch (e) { showToast("Kunde inte avbryta: " + e.message, true); cancelBtn.disabled = false; }
    });

    async function scan(force) {
        try {
            await apiFetch(`/api/faces/ai/scan${force ? "?force=true" : ""}`, { method: "POST" });
            bar.classList.add("progress-bar-animated");
            startPolling();
        } catch (e) { showToast("Kunde inte starta: " + e.message, true); }
    }

    document.getElementById("scan-btn").addEventListener("click", () => scan(false));
    document.getElementById("scan-force-btn").addEventListener("click", async () => {
        if (!(await showConfirm("Kör om AI-detektering på ALLA foton? Tidigare obekräftade förslag ersätts.", { okLabel: "Kör om" }))) return;
        scan(true);
    });

    loadPhotos();
    apiFetch("/api/faces/ai/status").then(s => { if (s.running) startPolling(); }).catch(() => {});
})();
</script>
{% endblock %}
