{% extends "base.html" %}
{% block title %}Karta - Fotoscan{% endblock %}
{% block head %}<link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css">{% endblock %}

{% block content %}
<h1 class="h4 mb-3">Karta</h1>
<div id="overview-map" style="height: calc(100vh - 150px); border: 1px solid var(--bs-border-color); border-radius: var(--bs-border-radius)"></div>
<div id="map-empty" class="text-secondary small mt-2" hidden>Inga platser med koordinater än. Sätt fotografens position på foton via kartan i detaljvyn.</div>
{% endblock %}

{% block scripts %}
<script src="/static/vendor/leaflet/leaflet.js"></script>
<script src="/static/js/map_overview.js?v={{ asset_v }}"></script>
{% endblock %}
