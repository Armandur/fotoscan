# Lokal utveckling: bygger imagen lokalt och kör med --reload.
services:
  fotoscan:
    build: .
    container_name: fotoscan-dev
    ports:
      - "8810:8810"
    volumes:
      - ./app:/app/app
      - ./data:/data
      - ./export:/export
      - ./photos:/photos:ro
    command: uv run --no-dev uvicorn app.main:app --host 0.0.0.0 --port 8810 --reload
    restart: unless-stopped
